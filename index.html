<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lumina | Premium Salon & Spa</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/globals.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/page-home.css">

  <style>
    :root {
      --font-outfit: 'Outfit', sans-serif;
    }
  </style>

  <!-- Lucide icons -->
  <script src="js/lucide.min.js"></script>
</head>
<body>
  <main class="app-container" id="app">
    <div class="page-content container">
      
      <!-- Header -->
      <header class="header" id="homeHeader">
        <div>
          <p class="greeting">Good morning,</p>
          <h1 class="title" id="userNameLabel">there</h1>
        </div>
        <img
          src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?q=80&w=200&auto=format&fit=crop"
          alt="Profile"
          class="profilePic"
        />
      </header>

      <!-- Search -->
      <div class="searchBar">
        <i data-lucide="search" style="width: 20px; height: 20px;"></i>
        <input
          type="text"
          id="searchInput"
          placeholder="Search for services, salons..."
          class="searchInput"
        />
        <button id="clearSearchBtn" style="display: none; color: var(--text-tertiary); align-items: center;">
          <i data-lucide="x" style="width: 18px; height: 18px;"></i>
        </button>
      </div>

      <!-- Categories -->
      <section id="categoriesSection">
        <div class="sectionHeader">
          <h2 class="sectionTitle">Categories</h2>
        </div>
        <div class="categoriesGrid" id="categoriesGrid">
          <!-- Populated via JS -->
        </div>
      </section>

      <!-- Services -->
      <section>
        <div class="sectionHeader">
          <h2 class="sectionTitle" id="servicesTitle">Featured Services</h2>
          <a href="services.html" class="seeAll" id="seeAllBtn">See All</a>
        </div>

        <div class="servicesList" id="servicesList">
          <!-- Skeletons initially -->
          <div class="skeleton" style="width: 100%; height: 100px; border-radius: 16px;"></div>
          <div class="skeleton" style="width: 100%; height: 100px; border-radius: 16px;"></div>
          <div class="skeleton" style="width: 100%; height: 100px; border-radius: 16px;"></div>
        </div>
      </section>

      <!-- Stylists -->
      <section style="margin-top: 32px; margin-bottom: 40px;">
        <div class="sectionHeader">
          <h2 class="sectionTitle">Top Stylists</h2>
          <a href="stylists.html" class="seeAll">See All</a>
        </div>
        <div class="stylistsScroll" id="stylistsScroll">
          <!-- Populated via JS -->
          <div class="skeleton" style="width: 140px; height: 180px; border-radius: 16px; flex-shrink: 0;"></div>
          <div class="skeleton" style="width: 140px; height: 180px; border-radius: 16px; flex-shrink: 0;"></div>
        </div>
      </section>

    </div>
  </main>

  <!-- JS -->
  <script type="module" src="js/components.js"></script>
  <script type="module" src="js/page-home.js"></script>
</body>
</html>
