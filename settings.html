<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Settings | Lumina Salon</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/globals.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/page-settings.css">

  <style>
    :root { --font-outfit: 'Outfit', sans-serif; }
  </style>

  <script src="js/lucide.min.js"></script>
</head>
<body>
  <div class="app-container" id="app">
    <div class="container">
      <header class="header">
        <button class="backBtn" id="backBtn">
          <i data-lucide="chevron-left" style="width: 24px; height: 24px;"></i>
        </button>
        <h1 class="title">Settings</h1>
      </header>

      <div class="groups">
        <!-- Account Group -->
        <div class="group">
          <p class="groupLabel">Account</p>
          <div class="groupItems">
            <button class="row" id="editProfileBtn">
              <div class="rowIcon"><i data-lucide="user"></i></div>
              <span class="rowLabel">Edit Profile</span>
              <span class="rowValue" id="profileNameValue"></span>
              <i data-lucide="chevron-left" class="rowArrow" style="width: 16px; height: 16px;"></i>
            </button>
            <button class="row" id="changePasswordBtn">
              <div class="rowIcon"><i data-lucide="lock"></i></div>
              <span class="rowLabel">Change Password</span>
              <i data-lucide="chevron-left" class="rowArrow" style="width: 16px; height: 16px;"></i>
            </button>
          </div>
        </div>

        <!-- Preferences Group -->
        <div class="group">
          <p class="groupLabel">Preferences</p>
          <div class="groupItems">
            <button class="row" id="notificationsBtn">
              <div class="rowIcon"><i data-lucide="bell"></i></div>
              <span class="rowLabel">Notifications</span>
              <div class="toggle toggleOn" id="notificationsToggle">
                <div class="toggleThumb"></div>
              </div>
            </button>
            <button class="row" id="darkModeBtn">
              <div class="rowIcon"><i data-lucide="moon"></i></div>
              <span class="rowLabel">Dark Mode</span>
              <div class="toggle" id="darkModeToggle">
                <div class="toggleThumb"></div>
              </div>
            </button>
            <button class="row" id="languageBtn">
              <div class="rowIcon"><i data-lucide="globe"></i></div>
              <span class="rowLabel">Language</span>
              <span class="rowValue" id="languageValue">English</span>
              <i data-lucide="chevron-left" class="rowArrow" style="width: 16px; height: 16px;"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- General Modal Overlay -->
      <div id="modalOverlay" class="overlay" style="display: none;">
        <div class="sheet" id="modalSheet" onclick="event.stopPropagation()">
          <div class="sheetHandle"></div>
          
          <!-- Content will be injected dynamically via JS -->
          <div id="modalContent"></div>
          
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="js/page-settings.js"></script>
</body>
</html>
