<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stylist Profile | Lumina Salon</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/globals.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/page-login.css">
  <link rel="stylesheet" href="css/page-stylist-detail.css">

  <style>
    :root { --font-outfit: 'Outfit', sans-serif; }
  </style>

  <script src="js/lucide.min.js"></script>
</head>
<body>
  <div class="app-container" id="app">
    <div class="container" id="mainContainer">
      <!-- Loading Skeletons -->
      <div id="loadingState">
        <div class="skeleton heroImage" style="border-radius: 0; min-height: 350px;"></div>
        <div class="content">
          <div class="skeleton" style="width: 60%; height: 40px;"></div>
          <div style="margin-top: 12px">
            <div class="skeleton" style="width: 100%; height: 20px; margin-bottom: 8px;"></div>
            <div class="skeleton" style="width: 80%; height: 20px;"></div>
          </div>
        </div>
      </div>

      <!-- Loaded Content -->
      <div id="loadedState" style="display: none;">
        <button class="backBtn" id="backBtn">
          <i data-lucide="chevron-left" style="width: 24px; height: 24px;"></i>
        </button>

        <div class="heroWrapper">
          <img id="stylistHeroImg" src="" alt="Stylist Image" class="heroImage" />
          <div class="heroOverlay"></div>
          <div class="heroInfo">
            <h1 class="stName" id="stylistName"></h1>
            <p class="stRole" id="stylistRole"></p>
          </div>
        </div>

        <div class="content">
          <div class="statsBar">
            <div class="statItem">
              <i data-lucide="star" class="star"></i>
              <span id="stylistRating">0.0</span>
            </div>
            <div class="statDivider"></div>
            <div class="statItem">
              <i data-lucide="award"></i>
              <span id="stylistExp">5+ Years</span>
            </div>
            <div class="statDivider"></div>
            <div class="statItem">
              <i data-lucide="message-square"></i>
              <span id="reviewCountText">0 Reviews</span>
            </div>
          </div>

          <div class="section">
            <h3 class="sectionTitle">Professional Skills</h3>
            <div class="skillsList" id="skillsList">
              <!-- Skills badges -->
            </div>
          </div>

          <div class="section">
            <h3 class="sectionTitle">Bio & Achievements</h3>
            <p class="description" id="stylistBio"></p>
            <ul class="achievementsList" id="achievementsList">
              <!-- Achievements items -->
            </ul>
          </div>

          <div class="section">
            <h3 class="sectionTitle">Portfolio</h3>
            <div class="portfolioGrid" id="portfolioGrid">
              <!-- Images -->
            </div>
          </div>

          <div class="reviewsSection">
            <div class="reviewsHeader">
              <h3 class="sectionTitle">Customer Reviews</h3>
              <button class="writeReviewBtn" id="showReviewFormBtn">Write a Review</button>
            </div>

            <!-- Review Form -->
            <div class="reviewFormContainer" id="reviewFormContainer" style="display: none;">
              <div class="starSelector" id="starSelector">
                <i data-lucide="star" class="star-outline" data-value="1"></i>
                <i data-lucide="star" class="star-outline" data-value="2"></i>
                <i data-lucide="star" class="star-outline" data-value="3"></i>
                <i data-lucide="star" class="star-outline" data-value="4"></i>
                <i data-lucide="star" class="star-outline" data-value="5"></i>
              </div>
              <textarea id="reviewComment" placeholder="Share your experience..." class="reviewTextarea"></textarea>
              <div class="formActions">
                <button class="btn-cancel" id="cancelReviewBtn">Cancel</button>
                <button class="btn-submit" id="submitReviewBtn">Post Review</button>
              </div>
            </div>

            <div id="reviewsList" class="reviewsList">
              <p class="emptyReviews">No reviews yet.</p>
            </div>
          </div>
        </div>

        <div class="bottomAction">
          <a href="#" id="bookWithBtn" style="width: 100%; text-decoration: none;">
            <button class="btn-primary btn-lg" style="width: 100%;">Book Now</button>
          </a>
        </div>
      </div>

      <!-- Error state -->
      <div id="errorState" style="display: none; padding: 40px; text-align: center; color: var(--text-secondary);">
        Stylist not found
      </div>
    </div>
  </div>

  <script type="module" src="js/page-stylist-detail.js"></script>
</body>
</html>
