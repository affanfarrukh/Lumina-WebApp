<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Admin Stylists | Lumina Salon</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/globals.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/page-admin.css">
  <link rel="stylesheet" href="css/page-admin-panel.css">

  <style>
    :root { --font-outfit: 'Outfit', sans-serif; }
  </style>

  <script src="js/lucide.min.js"></script>
</head>
<body>
  <div class="shell" id="app">
    
    <nav class="topNav">
      <div class="sidebarLogo">✦ Lumina</div>
      <div class="navLinks">
        <a href="admin.html" class="navLink" title="Dashboard">
          <i data-lucide="layout-dashboard" style="width: 16px; height: 16px;"></i>
        </a>
        <a href="admin-services.html" class="navLink" title="Services">
          <i data-lucide="scissors" style="width: 16px; height: 16px;"></i>
        </a>
        <a href="admin-stylists.html" class="navLink active" title="Stylists">
          <i data-lucide="users" style="width: 16px; height: 16px;"></i>
        </a>
        <a href="admin-bookings.html" class="navLink" title="Bookings">
          <i data-lucide="calendar" style="width: 16px; height: 16px;"></i>
        </a>
      </div>
    </nav>

    <div class="content page" style="padding: 24px;">
      <div class="topRow">
        <h1 class="heading">Stylists</h1>
        <button class="addBtn" id="openAddBtn">
          <i data-lucide="plus" style="width: 16px; height: 16px;"></i> Add Stylist
        </button>
      </div>

      <table class="table" style="margin-top: 10px;">
        <thead>
          <tr>
            <th>Photo</th>
            <th>Name</th>
            <th>Rating</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="stylistsTableBody">
          <!-- Populated by JS -->
        </tbody>
      </table>

      <!-- Overlay Panel -->
      <div class="overlay" id="panelOverlay" style="display: none;">
        <div class="panel" id="sidePanel" onclick="event.stopPropagation()">
          <div class="panelHeader">
            <h2 class="panelTitle" id="panelTitle">Add Stylist</h2>
            <button class="panelClose" id="closePanelBtn"><i data-lucide="x" style="width: 20px; height: 20px;"></i></button>
          </div>
          <div class="form">
            <div class="fieldGroup">
              <label class="panelLabel">Full Name</label>
              <input class="panelInput" id="inpName" placeholder="e.g. Aria Montgomery" />
            </div>
            <div class="fieldGroup">
              <label class="panelLabel">Role / Specialty</label>
              <input class="panelInput" id="inpRole" placeholder="e.g. Senior Hair Stylist" />
            </div>
            <div class="fieldGroup">
              <label class="panelLabel">Photo URL</label>
              <input class="panelInput" id="inpImage" placeholder="https://..." />
            </div>
            <div class="fieldGroup">
              <label class="panelLabel">Rating (out of 5)</label>
              <input class="panelInput" type="number" id="inpRating" step="0.1" min="1" max="5" />
            </div>
            <div class="fieldGroup">
              <label class="panelLabel">Number of Reviews</label>
              <input class="panelInput" type="number" id="inpReviews" />
            </div>
            <button class="saveBtn" id="saveBtn">Save Changes</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script type="module" src="js/page-admin-stylists.js"></script>
</body>
</html>
